<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration - IIC Open Trials 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="register.css">
</head>

<body class="register-page">
  <script>
    const deadline = new Date("2026-04-04T23:59:00+05:30");

    function checkDeadline() {
      const now = new Date();

      if (now > deadline) {
        const form = document.querySelector("form");
        const closedMsg = document.getElementById("registrationClosed");
        const submitBtn = document.querySelector("button[type='submit']");

        if (form) form.style.display = "none";
        if (submitBtn) submitBtn.disabled = true;
        if (closedMsg) closedMsg.style.display = "block";
      }
    }

    checkDeadline();
  </script>

  <!-- Minimal Nav -->
  <nav class="navbar scrolled">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-text">IIC TRIAL<span class="highlight">S</span></span>
      </a>
      <a href="index.html" class="btn-secondary" style="margin-top:0; padding:8px 20px;">&larr; Home</a>
    </div>
  </nav>

  <main class="register-main">
    <div class="register-container">

      <!-- Main Registration Card -->
      <div id="form-card" class="register-card">
        <div class="form-header">
          <h2>IIC Open Trials</h2>
          <h3>Registration</h3>
          <p class="date">6th–8th April 2026</p>
        </div>

        <form id="registerForm">

          <div class="form-section">
            <div class="form-row">
              <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Ayush">
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <!-- EmailOTP removed, just standard verification -->
                <input type="email" id="email" name="email" required placeholder="ayush@gmail.ocm">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="e.g. 9876543210" pattern="[0-9]{10}"
                  minlength="10" maxlength="10" title="Please enter exactly 10 digits">
              </div>

              <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="branch">Branch</label>
                <select id="branch" name="branch" required>
                  <option value="" disabled selected>Select Branch</option>
                  <option value="CE">CE</option>
                  <option value="IT">IT</option>
                  <option value="AI">AIDS</option>
                  <option value="ENTC">ENTC</option>
                  <option value="ECE">ECE</option>
                  <option value="CSE">CSE</option>
                  <option value="CSE-AI">CSE-AI</option>
                  <option value="MECH">MECH</option>
                  <option value="OTHER">OTHER</option>
                </select>
              </div>
              <div class="form-group">
                <label for="year">Year</label>
                <select id="year" name="year" required>
                  <option value="" disabled selected>Select Year</option>
                  <option value="FE">First Year (FE)</option>
                  <option value="SE">Second Year (SE)</option>
                  <option value="TE">Third Year (TE)</option>
                  <option value="BE">Final Year (BE)</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="division">Division</label>
              <input type="text" id="division" name="division" required placeholder="e.g. A, B, C">
            </div>
          </div>

          <div class="form-section">
            <div class="team-selection-title">Select Teams to Apply For</div>

            <!-- Cards instead of checkboxes -->
            <div class="team-grid" id="team-selection-grid">
              <div class="team-selectable-card" data-team="Social Media">Social Media</div>
              <div class="team-selectable-card" data-team="PR Team">PR Team</div>
              <div class="team-selectable-card" data-team="Tech Team">Tech Team</div>
              <div class="team-selectable-card" data-team="Sponsor Team">Sponsor Team</div>
              <div class="team-selectable-card" data-team="Event Team">Event Team</div>
              <div class="team-selectable-card" data-team="Design Team">Design Team</div>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="btn-submit-main" class="btn-submit">
            <span class="btn-text">Register for IIC Open Trials</span>
            <span class="loader hidden"></span>
          </button>

          <div id="form-error" class="error-msg hidden"></div>
        </form>
      </div>

      <!-- Success Card -->
      <div id="success-card" class="success-card hidden">
        <div class="success-icon">🏆</div>
        <h2>You are registered for IIC Open Trials</h2>
        <p>A confirmation email has been dispatched. See you at the Carnival!</p>
      </div>

    </div>
  </main>

  <script src="register.js"></script>
</body>

</html>
